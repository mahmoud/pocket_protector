[tox]
envlist = py310,py311,py312,py313,py314
requires = tox-uv

[testenv]
changedir = .tox
dependency_groups = dev
deps =
    face @ git+https://github.com/mahmoud/face.git@25c93c813d917b152b4370c2507b9cab8f622a56
commands =
    coverage run --rcfile {tox_root}/pyproject.toml --parallel -m pytest {posargs} {env_site_packages_dir}/pocket_protector/tests/

[testenv:coverage-report]
changedir = .tox
dependency_groups = dev
commands =
    coverage combine --rcfile {tox_root}/pyproject.toml
    coverage xml --rcfile {tox_root}/pyproject.toml -o coverage.xml
    coverage report --rcfile {tox_root}/pyproject.toml
    coverage html --rcfile {tox_root}/pyproject.toml -d {tox_root}/htmlcov
